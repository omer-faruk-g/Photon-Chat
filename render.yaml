services:
  - type: web
    name: photon-chat-server
    env: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: PORT
        value: 3000
      # Opsiyonel: Pulse AI icin Anthropic API anahtari
      # Render dashboard > Environment > ANTHROPIC_API_KEY olarak ekle
