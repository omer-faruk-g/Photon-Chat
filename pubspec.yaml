name: photon_chat
description: "Photon Chat - FIP tabanlı, telefon numarası gerektirmeyen güvenli mesajlaşma uygulaması"
publish_to: 'none'
version: 4.0.0+19

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.5.0
  http: ^1.2.0
  crypto: ^3.0.3
  cryptography: ^2.7.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.0
  image_picker: ^1.1.2
  package_info_plus: ^8.3.0
  url_launcher: ^6.3.0
  dio: ^5.7.0
  open_file: ^3.5.0
  path_provider: ^2.1.4
  flutter_local_notifications: ^18.0.0
  share_plus: ^10.1.0
  speech_to_text: ^7.0.0
  workmanager: ^0.9.0
  flutter_image_compress: ^2.3.0
  image: ^4.0.0
  geolocator: ^14.0.0
  flutter_tts: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ">=0.14.0 <1.0.0"

flutter:
  uses-material-design: true
  assets:
    - assets/icon/icon.png

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"
  windows:
    generate: true
    image_path: "assets/icon/icon.png"
    icon_size: 256
  macos:
    generate: false
  adaptive_icon_background: "#0B0E0F"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"
