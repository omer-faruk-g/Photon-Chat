name: photon_chat
description: "Photon Chat (KNK) - FIP tabanlı, telefon numarası gerektirmeyen mesajlaşma uygulaması"
publish_to: 'none'
version: 4.0.0+19

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.2
  http: ^1.2.0
  crypto: ^3.0.3
  cryptography: ^2.7.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3
  image_picker: ^1.1.2
  package_info_plus: ^8.0.0
  url_launcher: ^6.3.0
  dio: ^5.7.0
  open_file: ^3.3.2
  path_provider: ^2.1.4
  flutter_local_notifications: ^17.2.3
  share_plus: ^10.0.0
  speech_to_text: ^6.6.2
  workmanager: ^0.5.2
  flutter_image_compress: ^2.3.0
  image: ^4.0.0
  geolocator: ^14.0.0
  flutter_tts: ^4.0.0
  record: ^5.0.0
  permission_handler: ^11.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ">=0.13.1 <1.0.0"

flutter:
  uses-material-design: true
  assets:
    - assets/icon/icon.png

# Tek kaynaktan Android/iOS/Windows/Linux/macOS/Web icon üretimi.
# Çalıştırmak için: flutter pub get && flutter pub run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"
  windows:
    generate: true
    image_path: "assets/icon/icon.png"
    icon_size: 256
  macos:
    generate: false
  adaptive_icon_background: "#0B0E0F"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"
