name: Reorder Releases

on:
  workflow_dispatch:

jobs:
  reorder:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Re-publish releases in desired order
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          # Desired display order (top to bottom): v2.0.1, v2.0.0, v1.0.5, v1.0.4+
          # GitHub lists newest published_at first, so re-publish oldest->newest in this order:
          ORDER="v1.0.4+ v1.0.5 v2.0.0 v2.0.1"

          get_id() {
            local tag="$1"
            curl -s -H "Authorization: Bearer $GH_TOKEN" \
                 -H "Accept: application/vnd.github+json" \
                 "https://api.github.com/repos/$REPO/releases" \
              | python3 -c "import sys,json; tag='$tag'; print(next((r['id'] for r in json.load(sys.stdin) if r['tag_name']==tag), ''))"
          }

          for tag in $ORDER; do
            id=$(get_id "$tag")
            if [ -z "$id" ]; then
              echo "Release $tag not found, skipping"
              continue
            fi
            echo "Re-publishing $tag (id=$id)..."
            # set to draft
            curl -s -X PATCH -H "Authorization: Bearer $GH_TOKEN" \
                 -H "Accept: application/vnd.github+json" \
                 "https://api.github.com/repos/$REPO/releases/$id" \
                 -d '{"draft":true}' > /dev/null
            sleep 2
            # publish again -> published_at = now
            curl -s -X PATCH -H "Authorization: Bearer $GH_TOKEN" \
                 -H "Accept: application/vnd.github+json" \
                 "https://api.github.com/repos/$REPO/releases/$id" \
                 -d '{"draft":false}' > /dev/null
            echo "Done $tag"
            sleep 3
          done

          echo "Reorder complete."
