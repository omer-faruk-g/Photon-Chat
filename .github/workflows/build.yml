name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  build-android:
    if: github.event.inputs.tag != 'REORDER' && github.event.inputs.tag != 'UPDATE_NOTES'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      - name: Install clean Android SDK 35 platform
        run: |
          rm -rf $ANDROID_HOME/platforms/android-35
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "platforms;android-35"
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;25.1.8937393"
      - name: Generate Android platform files via flutter create
        run: |
          flutter create --org com.example --project-name knk_flutter --platforms android /tmp/flutter_template
          rm -rf android
          cp -r /tmp/flutter_template/android android
          sed -i 's/id "org.jetbrains.kotlin.android" version "[^"]*"/id "org.jetbrains.kotlin.android" version "2.0.20"/' android/settings.gradle
          sed -i 's/id "com.android.application" version "[^"]*"/id "com.android.application" version "8.7.3"/' android/settings.gradle
          sed -i 's|distributionUrl=.*|distributionUrl=https\\://services.gradle.org/distributions/gradle-8.11.1-all.zip|' android/gradle/wrapper/gradle-wrapper.properties
          python3 - << 'PYEOF'
          import re
          with open('android/app/build.gradle') as f:
              c = f.read()
          c = re.sub(r'ndkVersion\s*=?\s*flutter\.ndkVersion', 'ndkVersion = "25.1.8937393"', c)
          c = re.sub(r'compileSdk\s*=?\s*flutter\.compileSdkVersion', 'compileSdk = 35', c)
          c = re.sub(r'targetSdk\s*=?\s*flutter\.targetSdkVersion', 'targetSdk = 35', c)
          c = re.sub(r'([ \t]*)(sourceCompatibility\s*=?\s*JavaVersion)', r'\1coreLibraryDesugaringEnabled = true\n\1\2', c, count=1)
          open('android/app/build.gradle', 'w').write(c)
          with open('android/app/build.gradle', 'a') as f:
              f.write("\ndependencies {\n    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'\n}\n")
          print(open('android/app/build.gradle').read())
          PYEOF
          sed -i 's/android:label="[^"]*"/android:label="Photon Chat"/' android/app/src/main/AndroidManifest.xml
          sed -i 's|<application|<uses-permission android:name="android.permission.CAMERA" />\n    <uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.REQUEST_INSTALL_PACKAGES" />\n    <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />\n    <uses-permission android:name="android.permission.VIBRATE" />\n    <application|' android/app/src/main/AndroidManifest.xml
          mkdir -p android/app/src/main/kotlin/com/example/knk_flutter/
          cat > android/app/src/main/kotlin/com/example/knk_flutter/MainActivity.kt << 'KOTLIN'
          package com.example.knk_flutter

          import android.os.Bundle
          import android.view.WindowManager
          import io.flutter.embedding.android.FlutterActivity

          class MainActivity : FlutterActivity() {
              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  window.setFlags(
                      WindowManager.LayoutParams.FLAG_SECURE,
                      WindowManager.LayoutParams.FLAG_SECURE
                  )
              }
          }
          KOTLIN
      - run: flutter pub get
      - name: Generate launcher icons
        run: flutter pub run flutter_launcher_icons
      - run: flutter build apk --release
      - run: cp build/app/outputs/flutter-apk/app-release.apk PhotonChat-Android.apk
      - uses: actions/upload-artifact@v4
        with:
          name: PhotonChat-Android
          path: PhotonChat-Android.apk

  build-windows:
    if: github.event.inputs.tag != 'REORDER' && github.event.inputs.tag != 'UPDATE_NOTES'
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: microsoft/setup-msbuild@v2
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      - name: Generate Windows platform files via flutter create
        run: |
          flutter create --org com.example --project-name knk_flutter --platforms windows C:\flutter_template
          if (Test-Path windows) { Remove-Item -Recurse -Force windows }
          Copy-Item -Recurse C:\flutter_template\windows windows
          (Get-Content windows\runner\main.cpp) -replace 'L"knk_flutter"', 'L"Photon Chat"' | Set-Content windows\runner\main.cpp
        shell: pwsh
      - run: flutter config --enable-windows-desktop
      - run: flutter pub get
      - name: Generate launcher icons
        run: flutter pub run flutter_launcher_icons
      - run: flutter build windows --release
      - run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath PhotonChat-Windows.zip
      - uses: actions/upload-artifact@v4
        with:
          name: PhotonChat-Windows
          path: PhotonChat-Windows.zip

  build-linux:
    if: github.event.inputs.tag != 'REORDER' && github.event.inputs.tag != 'UPDATE_NOTES'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -y -o Acquire::Retries=3
          sudo apt-get install -y --no-install-recommends clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev
      - name: Generate Linux platform files via flutter create
        run: |
          flutter create --org com.example --project-name knk_flutter --platforms linux /tmp/flutter_template
          rm -rf linux
          cp -r /tmp/flutter_template/linux linux
          sed -i 's/set(BINARY_NAME "knk_flutter")/set(BINARY_NAME "photon_chat")/' linux/CMakeLists.txt
          sed -i 's/set(APPLICATION_ID "com.example.knk_flutter")/set(APPLICATION_ID "com.example.photon_chat")/' linux/CMakeLists.txt
      - run: flutter config --enable-linux-desktop
      - run: flutter pub get
      - name: Generate launcher icons
        run: flutter pub run flutter_launcher_icons
      - run: flutter build linux --release
      - run: |
          cd build/linux/x64/release/bundle
          tar -czf ${{ github.workspace }}/PhotonChat-Linux.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: PhotonChat-Linux
          path: PhotonChat-Linux.tar.gz

  update-notes:
    if: github.event.inputs.tag == 'UPDATE_NOTES'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Update all release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: python3 .github/scripts/release_notes.py update-all

  reorder-releases:
    if: github.event.inputs.tag == 'REORDER'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Re-publish releases in desired order
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          # Desired display order (top to bottom): v2.0.1, v2.0.0, v1.0.5, v1.0.4+
          # GitHub lists newest published_at first, so re-publish oldest->newest in this order:
          ORDER="v1.0.4+ v1.0.5 v2.0.0 v2.0.1"
          get_id() {
            curl -s -H "Authorization: Bearer $GH_TOKEN" \
                 -H "Accept: application/vnd.github+json" \
                 "https://api.github.com/repos/$REPO/releases?per_page=100" \
              | python3 -c "import sys,json; t='$1'; print(next((r['id'] for r in json.load(sys.stdin) if r['tag_name']==t), ''))"
          }
          for tag in $ORDER; do
            id=$(get_id "$tag")
            if [ -z "$id" ]; then echo "Release $tag not found, skipping"; continue; fi
            echo "Re-publishing $tag (id=$id)..."
            curl -s -X PATCH -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" \
                 "https://api.github.com/repos/$REPO/releases/$id" -d '{"draft":true}' > /dev/null
            sleep 2
            curl -s -X PATCH -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" \
                 "https://api.github.com/repos/$REPO/releases/$id" -d '{"draft":false,"make_latest":"true"}' > /dev/null
            echo "Done $tag"
            sleep 3
          done
          echo "Reorder complete."

  release:
    if: github.event.inputs.tag != 'REORDER' && github.event.inputs.tag != 'UPDATE_NOTES'
    needs: [build-android, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: PhotonChat-Android
          path: ./dist
      - uses: actions/download-artifact@v4
        with:
          name: PhotonChat-Windows
          path: ./dist
      - uses: actions/download-artifact@v4
        with:
          name: PhotonChat-Linux
          path: ./dist
      - uses: actions/checkout@v4
      - name: Generate release notes
        id: notes
        env:
          TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
        run: python3 .github/scripts/release_notes.py output

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
          name: "Photon Chat ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}"
          body: ${{ steps.notes.outputs.body }}
          files: |
            ./dist/PhotonChat-Android.apk
            ./dist/PhotonChat-Windows.zip
            ./dist/PhotonChat-Linux.tar.gz
