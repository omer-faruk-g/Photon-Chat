name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version=8.3
        working-directory: android
      - run: flutter pub get
      - run: flutter build apk --release
      - run: cp build/app/outputs/flutter-apk/app-release.apk PhotonChat-Android.apk
      - uses: actions/upload-artifact@v4
        with:
          name: PhotonChat-Android
          path: PhotonChat-Android.apk

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      - run: flutter config --enable-windows-desktop
      - run: flutter pub get
      - run: flutter build windows --release
      - run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath PhotonChat-Windows.zip
      - uses: actions/upload-artifact@v4
        with:
          name: PhotonChat-Windows
          path: PhotonChat-Windows.zip

  release:
    needs: [build-android, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: PhotonChat-Android
          path: ./dist
      - uses: actions/download-artifact@v4
        with:
          name: PhotonChat-Windows
          path: ./dist
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
          name: "Photon Chat ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}"
          body: |
            ## Photon Chat

            Güvenli, sunucusuz P2P mesajlaşma uygulaması.

            ### İndir
            - **Android**: `PhotonChat-Android.apk` — telefona yükle
            - **Windows**: `PhotonChat-Windows.zip` — zip'i aç, `photon_chat.exe` çalıştır
          files: |
            ./dist/PhotonChat-Android.apk
            ./dist/PhotonChat-Windows.zip
